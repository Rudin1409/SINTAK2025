<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SINTAK 2026</title>
    <!-- Google Fonts for Tech/Cyber aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Orbitron:wght@500;700;800;900&display=swap" rel="stylesheet">
    <!-- FontAwesome for the functional icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Background elements for cyber aesthetic -->
    <div class="cyber-bg">
      <canvas id="bgCanvas"></canvas>
      <div class="grid"></div>
    </div>

    <!-- Main Content -->
    <div class="container">
      <div class="header">
        <div class="glow-lines"></div>
        <div class="central-graphic">
          <!-- Circular borders for the tech look -->
          <div class="circle-border"></div>
          <div class="circle-inner"></div>
          
          <div class="teks">
            <div class="animated-logo-container">
               <img src="Assets/Logo_Sintak.png" alt="Logo" class="main-logo-inside" />
            </div>
            <h1>SINTAK<br><span>2026</span></h1>
            
            <div class="cyber-icons">
               <i class="fa-solid fa-code"></i>
               <i class="fa-solid fa-terminal"></i>
               <i class="fa-solid fa-shield-halved"></i>
            </div>
          </div>
        </div>
        <h4 class="subtitle">STUDY CLUB INFORMATIKA </h4>
        <p class="tagline">CODE TO CREATE, SECURE TO ELEVATE</p>
        <div class="glow-divider"></div>
      </div>

      <div class="link-link">
        <a href="https://www.instagram.com/sintakpolsri" target="_blank">
          <button class="btn-icon">
            <img src="Assets/instagram.png" alt="" class="icon-left" />
            <span class="btn-text">Instagram</span>
            <div class="btn-glitch"></div>
          </button>
        </a>

        <a href="https://www.youtube.com/@sintakpolsri" target="_blank">
          <button class="btn-icon">
            <img src="Assets/youtube.png" alt="" class="icon-left" />
            <span class="btn-text">Youtube</span>
            <div class="btn-glitch"></div>
          </button>
        </a>
        
        <a href="mailto:studyclubinformaticspolsri@gmail.com">
          <button class="btn-icon">
            <img src="Assets/gmail.png" alt="" class="icon-left" />
            <span class="btn-text">Gmail</span>
            <div class="btn-glitch"></div>
          </button>
        </a>
        
        <a href="https://api.whatsapp.com/send?phone=6282279840310" target="_blank">
          <button class="btn-icon">
            <img src="Assets/wa.png" alt="" class="icon-left" />
            <span class="btn-text">Admin 1</span>
            <div class="btn-glitch"></div>
          </button>
        </a>
        
        <a href="https://api.whatsapp.com/send?phone=6282177632357" target="_blank">
          <button class="btn-icon">
            <img src="Assets/wa.png" alt="" class="icon-left" />
            <span class="btn-text">Admin 2</span>
            <div class="btn-glitch"></div>
          </button>
        </a>
      </div>
    </div>
    
    <script>
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let particles = [];
      const chars = ['</>', '{ }', '[ ]', '0101', '1010', 'if()', '=>', 'function()', 'null', 'void'];

      function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        particles = [];
        // Determine number of particles based on screen size safely
        const numParticles = Math.floor((width * height) / 12000); 
        for(let i=0; i<numParticles; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 1.5,
                vy: (Math.random() - 0.5) * 1.5,
                size: Math.random() * 2 + 1,
                // Only 20% of particles get code text to keep it clean
                char: Math.random() > 0.8 ? chars[Math.floor(Math.random()*chars.length)] : null,
                alpha: Math.random() * 0.5 + 0.1
            });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, width, height);
        for(let i=0; i<particles.length; i++) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;

            // Bounce off walls
            if(p.x < 0 || p.x > width) p.vx *= -1;
            if(p.y < 0 || p.y > height) p.vy *= -1;

            // Draw Node
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0, 255, 255, ${p.alpha})`;
            ctx.fill();

            // Draw IT characters
            if (p.char) {
                ctx.font = '12px Chakra Petch';
                ctx.fillStyle = `rgba(0, 255, 255, ${p.alpha * 1.5})`;
                ctx.fillText(p.char, p.x + 8, p.y + 4);
            }

            // Draw Connections
            for(let j=i+1; j<particles.length; j++) {
                let p2 = particles[j];
                let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                if(dist < 120) {
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.strokeStyle = `rgba(0, 255, 255, ${(120 - dist)/120 * 0.2})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', init);
      init();
      draw();
    </script>
  </body>
</html>
